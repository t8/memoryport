name: Tauri Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            binary_suffix: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            binary_suffix: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary_suffix: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            binary_suffix: x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-tauri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-tauri-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked || true

      - name: Build sidecar binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p uc-proxy -p uc-mcp -p uc-server

      - name: Copy sidecars (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p crates/uc-tauri/src-tauri/binaries
          cp target/${{ matrix.target }}/release/uc-proxy crates/uc-tauri/src-tauri/binaries/uc-proxy-${{ matrix.binary_suffix }}
          cp target/${{ matrix.target }}/release/uc-mcp crates/uc-tauri/src-tauri/binaries/uc-mcp-${{ matrix.binary_suffix }}
          cp target/${{ matrix.target }}/release/uc-server crates/uc-tauri/src-tauri/binaries/uc-server-${{ matrix.binary_suffix }}

      - name: Copy sidecars (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          mkdir -p crates/uc-tauri/src-tauri/binaries
          cp target/${{ matrix.target }}/release/uc-proxy.exe crates/uc-tauri/src-tauri/binaries/uc-proxy-${{ matrix.binary_suffix }}
          cp target/${{ matrix.target }}/release/uc-mcp.exe crates/uc-tauri/src-tauri/binaries/uc-mcp-${{ matrix.binary_suffix }}
          cp target/${{ matrix.target }}/release/uc-server.exe crates/uc-tauri/src-tauri/binaries/uc-server-${{ matrix.binary_suffix }}

      - name: Build UI
        working-directory: ui
        run: pnpm build

      - name: Build Tauri app
        working-directory: crates/uc-tauri/src-tauri
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Find bundle artifacts
        id: find
        shell: bash
        run: |
          echo "Searching for Tauri bundles..."
          find target -name "*.dmg" -o -name "*.app" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.deb" 2>/dev/null | head -20
          echo "---"
          # Collect all bundle paths
          mkdir -p dist
          find target -name "*.dmg" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.AppImage" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.msi" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.deb" -exec cp {} dist/ \; 2>/dev/null || true
          ls -la dist/ || echo "No bundles found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memoryport-${{ matrix.binary_suffix }}
          path: dist/*
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            memoryport-*/**/*.dmg
            memoryport-*/**/*.AppImage
            memoryport-*/**/*.msi
            memoryport-*/**/*.exe
          draft: false
          prerelease: false

name: Tauri Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            binary_suffix: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
            binary_suffix: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            binary_suffix: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            binary_suffix: x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-tauri-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-tauri-

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked || true

      # macOS: Import signing certificate
      - name: Import Apple certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Build sidecar binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p uc-proxy -p uc-mcp -p uc-server

      - name: Copy sidecars (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p crates/uc-tauri/src-tauri/binaries
          cp target/${{ matrix.target }}/release/uc-proxy crates/uc-tauri/src-tauri/binaries/uc-proxy-${{ matrix.binary_suffix }}
          cp target/${{ matrix.target }}/release/uc-mcp crates/uc-tauri/src-tauri/binaries/uc-mcp-${{ matrix.binary_suffix }}
          cp target/${{ matrix.target }}/release/uc-server crates/uc-tauri/src-tauri/binaries/uc-server-${{ matrix.binary_suffix }}

      - name: Copy sidecars (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          mkdir -p crates/uc-tauri/src-tauri/binaries
          cp target/${{ matrix.target }}/release/uc-proxy.exe crates/uc-tauri/src-tauri/binaries/uc-proxy-${{ matrix.binary_suffix }}
          cp target/${{ matrix.target }}/release/uc-mcp.exe crates/uc-tauri/src-tauri/binaries/uc-mcp-${{ matrix.binary_suffix }}
          cp target/${{ matrix.target }}/release/uc-server.exe crates/uc-tauri/src-tauri/binaries/uc-server-${{ matrix.binary_suffix }}

      - name: Build UI
        working-directory: ui
        run: pnpm build

      - name: Build Tauri app
        working-directory: crates/uc-tauri/src-tauri
        env:
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos') && secrets.APPLE_SIGNING_IDENTITY || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: cargo tauri build --target ${{ matrix.target }}

      # macOS: Notarize the .dmg
      - name: Notarize macOS app
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(find target -name "*.dmg" -print -quit)
          if [ -n "$DMG" ]; then
            echo "Notarizing $DMG..."
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$DMG"
            echo "Notarization complete"
          else
            echo "No .dmg found to notarize"
          fi

      - name: Find bundle artifacts
        id: find
        shell: bash
        run: |
          echo "Searching for Tauri bundles..."
          find target -name "*.dmg" -o -name "*.app" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.deb" -o -name "*.tar.gz" -o -name "*.sig" -o -name "*.nsis.zip" 2>/dev/null | head -30
          echo "---"
          mkdir -p dist
          # Installer bundles
          find target -name "*.dmg" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.AppImage" -not -name "*.tar.gz" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.msi" -not -name "*.zip" -exec cp {} dist/ \; 2>/dev/null || true
          find target -name "*.deb" -exec cp {} dist/ \; 2>/dev/null || true
          # Updater bundles + signatures
          find target -path "*/bundle/macos/*.tar.gz" -exec cp {} dist/ \; 2>/dev/null || true
          find target -path "*/bundle/macos/*.tar.gz.sig" -exec cp {} dist/ \; 2>/dev/null || true
          find target -path "*/bundle/appimage/*.tar.gz" -exec cp {} dist/ \; 2>/dev/null || true
          find target -path "*/bundle/appimage/*.tar.gz.sig" -exec cp {} dist/ \; 2>/dev/null || true
          find target -path "*/bundle/nsis/*.nsis.zip" -exec cp {} dist/ \; 2>/dev/null || true
          find target -path "*/bundle/nsis/*.nsis.zip.sig" -exec cp {} dist/ \; 2>/dev/null || true
          ls -la dist/ || echo "No bundles found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memoryport-${{ matrix.binary_suffix }}
          path: dist/*
          if-no-files-found: ignore

  release:
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate latest.json for auto-updater
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          BASE_URL="https://github.com/t8/memoryport/releases/download/${TAG}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read signatures from .sig files
          read_sig() {
            local pattern="$1"
            local sig_file=$(find memoryport-* -name "$pattern" 2>/dev/null | head -1)
            if [ -n "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          # Find updater bundle filenames
          find_bundle() {
            local pattern="$1"
            find memoryport-* -name "$pattern" ! -name "*.sig" 2>/dev/null | head -1 | xargs -I{} basename {} 2>/dev/null || echo ""
          }

          MACOS_AARCH64_BUNDLE=$(find_bundle "*.app.tar.gz" | head -1)
          MACOS_AARCH64_SIG=$(read_sig "*.app.tar.gz.sig" | head -1)

          # Build platforms JSON
          PLATFORMS="{}"

          # macOS aarch64
          SIG_FILE=$(find memoryport-aarch64-apple-darwin -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          BUNDLE_FILE=$(find memoryport-aarch64-apple-darwin -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$BUNDLE_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            NAME=$(basename "$BUNDLE_FILE")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$SIG" --arg url "${BASE_URL}/${NAME}" '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
          fi

          # macOS x86_64
          SIG_FILE=$(find memoryport-x86_64-apple-darwin -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          BUNDLE_FILE=$(find memoryport-x86_64-apple-darwin -name "*.app.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$BUNDLE_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            NAME=$(basename "$BUNDLE_FILE")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$SIG" --arg url "${BASE_URL}/${NAME}" '. + {"darwin-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # Linux x86_64
          SIG_FILE=$(find memoryport-x86_64-unknown-linux-gnu -name "*.AppImage.tar.gz.sig" 2>/dev/null | head -1)
          BUNDLE_FILE=$(find memoryport-x86_64-unknown-linux-gnu -name "*.AppImage.tar.gz" ! -name "*.sig" 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$BUNDLE_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            NAME=$(basename "$BUNDLE_FILE")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$SIG" --arg url "${BASE_URL}/${NAME}" '. + {"linux-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # Windows x86_64
          SIG_FILE=$(find memoryport-x86_64-pc-windows-msvc -name "*.nsis.zip.sig" 2>/dev/null | head -1)
          BUNDLE_FILE=$(find memoryport-x86_64-pc-windows-msvc -name "*.nsis.zip" ! -name "*.sig" 2>/dev/null | head -1)
          if [ -n "$SIG_FILE" ] && [ -n "$BUNDLE_FILE" ]; then
            SIG=$(cat "$SIG_FILE")
            NAME=$(basename "$BUNDLE_FILE")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$SIG" --arg url "${BASE_URL}/${NAME}" '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "Release ${TAG}" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            memoryport-*/**/*.dmg
            memoryport-*/**/*.AppImage
            memoryport-*/**/*.msi
            memoryport-*/**/*.exe
            memoryport-*/**/*.app.tar.gz
            memoryport-*/**/*.AppImage.tar.gz
            memoryport-*/**/*.nsis.zip
            latest.json
          draft: false
          prerelease: false
